<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Love Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a0010;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff0f3;
  }

  #hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .bg-heart {
    position: absolute;
    bottom: -60px;
    font-size: 22px;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
  }

  .screen {
    position: relative;
    z-index: 10; /* Поднимаем экраны выше фона */
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    padding: 20px;
    gap: 24px;
  }
  .screen.active { display: flex; }

  .card {
    background: rgba(255,77,109,0.1);
    border: 2px solid rgba(255,77,109,0.35);
    border-radius: 28px;
    padding: 40px;
    width: min(440px, 95vw);
    text-align: center;
    box-shadow: 0 20px 60px rgba(255,77,109,0.2);
  }

  h1 { font-family: 'Pacifico', cursive; font-size: clamp(2rem, 6vw, 3.5rem); color: #ff4d6d; text-shadow: 0 0 30px #ff4d6d88; }
  h2 { font-family: 'Pacifico', cursive; font-size: clamp(1.5rem, 4vw, 2.5rem); color: #ff4d6d; }
  
  .btn {
    padding: 13px 34px;
    border-radius: 50px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
    z-index: 20; /* Кнопки ВСЕГДА сверху */
  }
  .btn:hover { transform: translateY(-3px); }
  .btn:active { transform: scale(0.95); }
  .btn-pink  { background: linear-gradient(135deg,#ff4d6d,#c9184a); color:#fff; box-shadow:0 8px 22px rgba(255,77,109,0.5); }
  .btn-gray  { background: rgba(255,255,255,0.1); color:#fff; border: 2px solid rgba(255,255,255,0.25); margin-top: 10px; }
  .btn-green { background: linear-gradient(135deg,#22c55e,#15803d); color:#fff; }
  .btn-red   { background: linear-gradient(135deg,#ef4444,#991b1b); color:#fff; }

  input[type="text"] {
    width: 100%; padding: 13px 20px; border-radius: 50px; border: 2px solid rgba(255,77,109,0.5);
    background: rgba(255,255,255,0.06); color: white; text-align: center; margin-bottom: 20px; outline: none;
  }

  .big-heart { font-size: 80px; animation: hbeat 1.1s infinite; }
  @keyframes hbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  #game2-canvas {
    background: #1a0010;
    border: 2px solid rgba(255,77,109,0.4);
    border-radius: 16px;
    max-width: 95vw;
    touch-action: none; /* Чтобы экран не дергался на мобилках */
  }

  .result-msg { font-size: 1.2rem; font-weight: 900; padding: 15px; border-radius: 12px; margin: 10px 0; }
  .result-win { background: rgba(34,197,94,0.2); color: #86efac; border: 2px solid #22c55e; }
  .result-lose { background: rgba(239,68,68,0.15); color: #fca5a5; border: 2px solid #ef4444; }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<div class="screen active" id="screen-start">
  <h1>💕 Love Games</h1>
  <div class="card">
    <label style="display:block; margin-bottom:10px;">Как тебя зовут?</label>
    <input type="text" id="player-name" placeholder="Твоё имя...">
    <div style="display:flex; gap:10px; flex-direction:column;">
      <button class="btn btn-pink" onclick="startGame(1)">🎮 Игра 1: Любишь меня?</button>
      <button class="btn btn-pink" onclick="startGame(2)">🎯 Игра 2: Попади в сердце</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-game1">
  <h2 id="g1-title"></h2>
  <div class="big-heart">❤️</div>
  <div class="card">
    <p id="g1-question" style="margin-bottom:20px; font-weight:bold;">Ты любишь меня? 💕</p>
    <div id="g1-buttons" style="position:relative; height:100px; display:flex; align-items:center; justify-content:center; gap:20px;">
      <button class="btn btn-green" onclick="g1Answer('yes')">Да 💚</button>
      <button class="btn btn-red" id="btn-no-g1" onmouseenter="g1RunNo()" ontouchstart="g1RunNo()" onclick="g1ClickNo()">Нет ❌</button>
    </div>
    <div id="g1-result" class="result-msg" style="display:none;"></div>
  </div>
  <button class="btn btn-gray" onclick="goHome()">← Назад</button>
</div>

<div class="screen" id="screen-game2">
  <h2 id="g2-title" style="margin-bottom:10px;"></h2>
  <canvas id="game2-canvas" width="400" height="350"></canvas>
  <div id="g2-result" class="result-msg" style="display:none; width: 400px; max-width:90vw;"></div>
  <div style="display:flex; gap:10px; margin-top:10px;">
    <button class="btn btn-pink" onclick="g2Shoot()" id="shoot-btn">🔫 ВЫСТРЕЛ!</button>
    <button class="btn btn-gray" onclick="g2Reset()">🔄 Заново</button>
  </div>
  <button class="btn btn-gray" onclick="goHome()">← Назад</button>
</div>

<script>
const SPECIAL_PHRASE = 'аиша змейка шахина';
let playerName = '';
let isSpecial = false;

// Фон
const bg = document.getElementById('hearts-bg');
for (let i = 0; i < 20; i++) {
  const h = document.createElement('div');
  h.className = 'bg-heart';
  h.textContent = '❤️';
  h.style.left = Math.random() * 100 + 'vw';
  h.style.animationDuration = (5 + Math.random() * 5) + 's';
  h.style.animationDelay = (-Math.random() * 10) + 's';
  bg.appendChild(h);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { showScreen('screen-start'); }

function startGame(n) {
  const input = document.getElementById('player-name').value.trim();
  if (!input) { alert('Введи имя! 💕'); return; }
  playerName = input;
  isSpecial = (playerName.toLowerCase() === SPECIAL_PHRASE);
  
  if (n === 1) initGame1(); else initGame2();
}

// --- ИГРА 1 ---
function initGame1() {
  document.getElementById('g1-title').textContent = playerName;
  document.getElementById('g1-result').style.display = 'none';
  const noBtn = document.getElementById('btn-no-g1');
  noBtn.style.left = '0'; noBtn.style.top = '0';
  showScreen('screen-game1');
}

function g1RunNo() {
  if (!isSpecial) return;
  const btn = document.getElementById('btn-no-g1');
  btn.style.left = (Math.random() * 200 - 100) + 'px';
  btn.style.top = (Math.random() * 100 - 50) + 'px';
}

function g1ClickNo() {
  if (isSpecial) { g1RunNo(); return; }
  const res = document.getElementById('g1-result');
  res.textContent = "😢 Ты нажала нет... Но это правильно, ведь ты не моя!";
  res.className = "result-msg result-lose";
  res.style.display = "block";
}

function g1Answer(ans) {
  const res = document.getElementById('g1-result');
  res.style.display = 'block';
  if (isSpecial) {
    res.textContent = "💖 Я знал, что ты меня любишь! ✨";
    res.className = "result-msg result-win";
  } else {
    res.textContent = "😅 Эй, ты не та самая девушка! Нажми нет!";
    res.className = "result-msg result-lose";
  }
}

// --- ИГРА 2 ---
const canvas = document.getElementById('game2-canvas');
const ctx = canvas.getContext('2d');
let g2State = {};

function initGame2() {
  document.getElementById('g2-title').textContent = "Попади в сердце, " + playerName;
  g2Reset();
  showScreen('screen-game2');
}

function g2Reset() {
  cancelAnimationFrame(g2State.animId);
  g2State = {
    gunX: 200, gunDir: 1, bullet: null, shot: false,
    heartX: 200, heartY: 60, heartPulse: 0,
    result: null, animId: null,
    heartEscape: !isSpecial, homing: isSpecial
  };
  document.getElementById('g2-result').style.display = 'none';
  g2Loop();
}

function g2Shoot() {
  if (g2State.shot || g2State.result) return;
  g2State.shot = true;
  
  const dx = g2State.heartX - g2State.gunX;
  const dy = g2State.heartY - (canvas.height - 40);
  const dist = Math.sqrt(dx*dx + dy*dy);
  
  g2State.bullet = {
    x: g2State.gunX, y: canvas.height - 40,
    vx: (dx/dist) * 6, vy: (dy/dist) * 6
  };
}

function g2Loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const s = g2State;

  // Пушка
  if (!s.shot) {
    s.gunX += s.gunDir * 3;
    if (s.gunX > canvas.width - 20 || s.gunX < 20) s.gunDir *= -1;
  }
  ctx.fillStyle = '#ff4d6d';
  ctx.fillRect(s.gunX - 15, canvas.height - 30, 30, 20);

  // Сердце (убегает для чужих)
  if (s.heartEscape && s.bullet) {
    const d = Math.sqrt((s.bullet.x - s.heartX)**2 + (s.bullet.y - s.heartY)**2);
    if (d < 100) {
      s.heartX += (s.heartX - s.bullet.x > 0 ? 3 : -3);
      s.heartX = Math.max(30, Math.min(canvas.width - 30, s.heartX));
    }
  }
  
  // Рисуем сердце
  ctx.font = "40px serif";
  ctx.textAlign = "center";
  ctx.fillText("❤️", s.heartX, s.heartY + 15);

  // Пуля
  if (s.bullet && !s.result) {
    if (s.homing) { // Магнит
      s.bullet.vx += (s.heartX - s.bullet.x) * 0.02;
      s.bullet.vy += (s.heartY - s.bullet.y) * 0.02;
    }
    s.bullet.x += s.bullet.vx;
    s.bullet.y += s.bullet.vy;

    ctx.fillStyle = "gold";
    ctx.beginPath(); ctx.arc(s.bullet.x, s.bullet.y, 5, 0, 7); ctx.fill();

    const dist = Math.sqrt((s.bullet.x - s.heartX)**2 + (s.bullet.y - s.heartY)**2);
    if (dist < 30) {
      if (isSpecial) { s.result = 'win'; finishG2(true); }
    }
    if (s.bullet.y < 0 || s.bullet.x < 0 || s.bullet.x > canvas.width) {
      s.result = 'lose'; finishG2(false);
    }
  }
  s.animId = requestAnimationFrame(g2Loop);
}

function finishG2(win) {
  const res = document.getElementById('g2-result');
  res.style.display = "block";
  if (win) {
    res.textContent = "💖 ПОПАЛА! Прямо в моё сердце!";
    res.className = "result-msg result-win";
  } else {
    res.textContent = isSpecial ? "🤔 Промах? Попробуй еще раз!" : "❌ Мимо... Это сердце не для тебя!";
    res.className = "result-msg result-lose";
  }
}
</script>
</body>
</html>
